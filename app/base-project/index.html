<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Projeto Base | LogicLab</title>
    <link rel="shortcut icon" href="https://i.ibb.co/9mYN7ZtK/logo-projeto-base.png" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="content model__horizontal model__center">
        <section class="content__section model__vertical model__center">
            <h1 class="content__title">Projeto Base</h1>

            <div class="model__vertical model__center">
                <input type="number" id="amount" placeholder="Digite a quantidade" class="content__text-box"/>

                <select id="chosen-option" name="chosen-option" class="content__text-box">
                    <option value="1">Opção 1</option>
                    <option value="2">Opção 2</option>
                    <option value="3">Opção 3</option>
                </select>
            </div>

            <div class="model__horizontal model__center model__break">
                <button onclick="activeAddButton()" id="button-add" class="content__button add-background">
                    Adicionar
                </button>
                <button onclick="activeRestartButton()" id="button-restart" class="content__button restart-background" disabled>
                    Reiniciar
                </button>
                <button onclick="activeTriggerDraw()" id="button-trigger-draw" class="content__button random-background" disabled>
                    Sortear
                </button>
            </div>

            <div class="model__vertical model__center" id="element-message-alert"></div>
        </section>

        <section class="content__section model__vertical model__center">
            <h2 class="content__subtitle">Olá, Mundo!</h2>
            <p class="content__text">
                Mensagem de                 
                <span class="content__emphasis">Destaque</span> +
                <span class="content__tag success-background">tag</span>
            </p>

            <div class="model__vertical">
                <img src="https://i.ibb.co/9mYN7ZtK/logo-projeto-base.png" alt="Logo - Projeto Base" class="content__image content__opacity"/>
            </div>

            <div class="model__horizontal model__center model__break">
                <div class="content__box success-background">01</div>
                <div class="content__box danger-background">02</div>
                <div class="content__box restart-background">03</div>
            </div>
        </section>
    </main>

    <script src="js/script.js" defer></script>
</body>
</html>
